
 <!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8" /> 
   <meta name="viewport" content="width=device-width,initial-scale=1" />   
   <meta name="description" content="" />
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">  
   <link rel="stylesheet" type="text/css" href="./assets/style.css" />  
   <link rel="icon" />
   <title>The Brickoven</title>
</head> 
<body>  
  <div class="container">
   <div class="mt-5">
    <h1 class="display-2 text-center mt-5">
      <img width="100px" height="100px" src="./assets/images/Topmenulogo.png" />
        A National Favorite the<span class="badge text-bg-primary">Brickoven Cafe</span>  
    </h1>
    <div class="d-flex justify-content-center">
           <!--Start PreMade-Menu-->
      <div class="card mx-auto gap-3" id="favPies" style="width: 25rem">
        <h2 class="card-header display-flex">Our Favorite Pizza Pie's</h2>
        <ul class="card-body list-group list-group-flush ">
           <li class="list-group-item card-body fs-4 fw-italic d-flex justify-content-between align-items-center pie-List">
              <input class="form-check-input me-2" type="checkbox" id="pizza-traditional"/>
              <label for="pizza-traditional">Traditional Pepperoni</label>             
            <div>
              <p class="fw-bold text-end" id="pizza-traditional-price">$13</p>
            </div>
           </li>
          <li class="list-group-item card-body fs-4 fw-italic d-flex justify-content-between align-items-center pie-List">
              <input class="form-check-input me-2" type="checkbox" id="cheese-only"/>
              <label for="cheese-only">All cheese</label>
            <div class="d-flex flex-column align-items-start">
               <p class="mb-0 fw-bold" id="cheese-only-price">$10</p>
            </div>             
          </li>
          <li class="list-group-item card-body fs-4 fw-italic d-flex justify-content-between align-items-center pie-List">
              <input class="form-check-input me-2" type="checkbox" id="meatNcheese"/>
              <label for="meatNcheese">3-Meat & Cheese</label>
            <div class="d-flex flex-column align-items-start">
              <p class="fw-bold mb-0" id="meatNcheese-price">$15</p>
            </div>
          </li>
          <li class="list-group-item card-body fs-4 fw-italic d-flex justify-content-between align-items-center pie-List">
            <input class="form-check-input me-2" type="checkbox" id="supreme">
            <label for="supreme">Pesto Drizzle Supreme</label>
              <div>
                  <p class="fw-bold text-end" id="supreme-price">$16</p>
              </div>
          </li>
          <li class="list-group-item card-body fs-4 mr-4 fw-italic d-flex justify-content-between align-items-center pie-List">
            <input class="form-check-input me-2" type="checkbox" id="vegveng">
            <label for="vegveng">Vegitable Vengence</label><img width="25px" height="25px" src="./assets/images/vegan.svg">
               <div>
                 <p class="fw-bold text-end mb-0" id="vegveng-price">$14</p>
              </div>
          </li>
        </ul>
        <div class="card-footer">
          <small>All pizza's are created with 100% real cheese, fresh cut veggies, and premium meats</small>
        </div>
      </div>
           <!---Stop PreMade-->
           <!--Start BYOP-->
      <div class="row">
      <div class="card mx-3" id="byop"   style="width: 25rem;">
        <div class="card-header">
          <h2>Build Your Own Pie</h2>
        </div>
        <ul class="list-group list-group-flush">
                 <!--Pizza radius options-->
          <li class="dropdown list-group-item">
            <button class="btn btn-secondary" type="button" id="size-dropdown" data-bs-toggle="dropdown" aria-expanded="false">
              <h3>Pie Size</h3><span class="float-end">▼</span>
            </button>
            <ul class="dropdown-menu" aria-labelledby="size-dropdown">
              <li class="dropdown-item">
                <input class="form-check-input me-2" type="radio" name="pie-size" id="smCrust">
                <label for="smCrust">10"</label>  
              </li>
              <li class="dropdown-item">
                <input class="form-check-input me-2" type="radio" name="pie-size" id="mdCrust">
                <label for="mdCrust">12"</label>
              </li>
              <li class="dropdown-item">
                <input class="form-check-input me-2" type="radio" name="pie-size" id="regCrust">
                <label for="regCrust">14"</label>
              </li>
              <li class="dropdown-item">
                <input class="form-check-input me-2" type="radio" name="pie-size" id="lgCrust">
                <label for="lgCrust">16"</label>
              </li>
              <li class="dropdown-item">
                <input class="form-check-input me-2" type="radio" name="pie-size" id="xlCrust">
                <label for="xlCrust">18"</label>
              </li>    
            </ul>
          </li>
             <!--Crust choices-->
          <li class="dropdown list-group-item">
            <button class="btn btn-secondary" type="button" id="crust-dropdown" data-bs-toggle="dropdown" aria-expanded="false">
              <h3>Crust</h3><span class="float-end">▼</span>
            </button>
            <ul class="dropdown-menu" aria-labelledby="crust-dropdown">
              <li class="dropdown-item">
                <input class="form-check-input me-2" type="radio" name="crust" id="tossed">
                <label for="tossed">Hand-Tossed</label>
              </li>
              <li class="dropdown-item"> 
                <input class="form-check-input me-2" type="radio" name="crust" id="thin">
                <label for="thin">Thin</label>       
              </li>
              <li class="dropdown-item">
                <input class="form-check-input me-2" type="radio" name="crust" id="deepDish">
                <label for="deepDish">Deep-Dish</label>
              </li>
            </ul>
          </li>
            <!--SauceSelection-->
          <li class="dropdown list-group-item">
            <button class="btn btn-secondary" type="button" id="sauce-dropdown" data-bs-toggle="dropdown" aria-expanded="false">
              <h3>Sauce</h3><span class="float-end">▼</span>
            </button>
            <ul class="dropdown-menu" aria-labelledby="sauce-dropdown">
              <li class="dropdown-item">  
                <input class="form-check-input me-2" type="radio" name="sauce" id="tradRed">
                <label for="tradRed">Traditional Red</label>
              </li>
              <li class="dropdown-item">
                <input class="form-check-input me-2" type="radio" name="sauce" id="whiteSauce">
                <label for="whiteSauce">White-Sauce</label>
              </li>         
              <li class="dropdown-item">
                <input class="form-check-input me-2" type="radio" name="sauce" id="pesto">
                <label for="pesto">Pesto</label>
              </li>
              <li class="dropdown-item">
                <input class="form-check-input me-2" type="radio" name="sauce" id="none">
                <label for="none">none</label>
              </li>    
            </ul>
          </li>
           <!--Cheezes-->
          <li class="dropdown list-group-item">
            <button class="btn btn-secondary" type="button" id="cheese-dropdown" data-bs-toggle="dropdown" aria-expanded="false">
              <h3>Cheese</h3><span class="float-end">▼</span>
            </button>
            <ul class="dropdown-menu" aria-labelledby="cheese-dropdown">
              <li class="dropdown-item">  
                <input class="form-check-input me-2" type="checkbox" id="Mozz">
                <label for="Mozz">Mozzerella</label>
              </li>
              <li class="dropdown-item">
                <input class="form-check-input me-2" type="checkbox" id="feta">
                <label for="feta">Feta</label>
              </li>
              <li class="dropdown-item">
                <input class="form-check-input me-2" type="checkbox" id="provolone">
                <label for="provolone">Provolone</label>
              </li>
              <li class="dropdown-item"> 
                <input class="form-check-input me-2" type="checkbox" id="cheddar">
                <label for="cheddar">Cheddar</label>
              </li>
              <li class="dropdown-item">
                <input class="form-check-input me-2" type="checkbox" id="threeCheese">
                <label for="threeCheese">3-Cheese Blend</label>
              </li>
              <li class="dropdown-item">                     
                <input class="form-check-input me-2" type="checkbox" id="noCheez">
                <label for="noCheez">None</label>
              </li>     
            </ul>
          </li>
            <!--Topping Start-->
          <li class="list-group-item">
            <button class="btn btn-secondary w-100 text-start" type="button" id="toppings-dropdown" data-bs-toggle="collapse" data-bs-target="#toppingsCollapse">
              <h3>Toppings</h3><span class="float-end">▼</span>
            </button>
              <div class="collapse mt-2" id="toppingsCollapse">
                 <div class="p-2 border rounded bg-light">
                   <!-- Meat Group -->
                  <div class="mb-3">
                     <label class="fw-bold d-block mb-1">Meats</label>
                       <div class="form-check">
                         <input class="form-check-input" type="checkbox" id="pep"> <label for="pep">Pepperoni</label>
                       </div>
                       <div class="form-check">
                          <input class="form-check-input" type="checkbox" id="sau"> <label for="sau">Sausage</label>
                       </div>
                       <div class="form-check">
                          <input class="form-check-input" type="checkbox" id="bac"> <label for="bac">Bacon</label>
                       </div>
                    </div>
                    <!-- Veggie Group -->
                    <div>
                     <label class="fw-bold d-block mb-1">Vegetables</label>
                     <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="tom"> <label for="tom">Tomato</label>
                     </div>
                     <div class="form-check">
                       <input class="form-check-input" type="checkbox" id="gp"> <label for="gp">Green Pepper</label>
                     </div>
                     <div class="form-check">
                       <input class="form-check-input" type="checkbox" id="bp"> <label for="bp">Banana Pepper</label>
                    </div>
                  </div>
              </div>
            </div>
          </li>
        </ul>
        <!--Stop BYOP---->           
        <div class="col-md-6 mb-4" id="order-form">
          <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
               <h5 class="mb-0">Order #<span class="order-id"></span></h5>
               <span class="badge bg-primary order-status">Confirmed</span>
            </div>
            <div class="card-body">
               <div class="order-items">
                 <!-- Items will be added here -->
               </div>
               <img src="" class="order-gif img-fluid mt-3 mb-3" style="max-height: 150px;">
               <button class="btn btn-primary w-100 next-stage-btn">Next stage</button>
            </div>         
            <div class="card mb-3">
              <div class="card-header bg-info text-white">
                <h5 class="mb-0">Customer Information</h5>
              </div>
              <div class="card-body">
                <div class="mb-3">
                  <label for="custieName" class="form-label">Name:</label>
                  <input type="text" id="custieName" class="form-control" placeholder="Enter your name...">
                </div>
                <div class="mb-3">
                  <label for="custieAddy" class="form-label">Address:</label>
                  <input type="text" id="custieAddy" class="form-control" placeholder="Enter your address....">
                </div>
                <div class="mb-3">
                  <label for="custiePhone" class="form-label">Phone Number:</label>
                  <input type="tel" id="custiePhone" class="form-control" placeholder="Enter your phone number...">
                </div>
                <div class="mb-3">
                  <label for="custieEmail" class="form-label">Email Address:</label>
                  <input type="email" id="custieEmail" class="form-control" placeholder="Enter your email...">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>  
    </div> 
   </div>
  </div>        
</div>


 <footer>
   <small>©<script>document.write(new Date().getFullYear())</script>Your company name. All Rights Reserved.</small> 
 </footer><script src="https://code.jquery.com/jquery-4.0.0.min.js" crossorigin="anonymous"></script>  
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
     <script src="./assets/index.js"></script>
   </body>
</html>
